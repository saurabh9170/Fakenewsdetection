<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Logout in top-right corner -->
<div class="top-bar">
    <div class="welcome-text">Welcome, {{ session['username'] }}</div>
    <form action="{{ url_for('logout') }}" method="get">
        <button class="logout-btn">Logout</button>
    </form>
</div>

<div class="container">

<h1>📰 Fake News Detection System</h1>
<p>Enter a news article or headline to check if it is real or fake.</p>

<form action="/dashboard" method="post">
    <textarea name="news" placeholder="Paste news text here..." required></textarea>
    <br>
    <button type="submit">Check News</button>
</form>

<div class="result">
<h2>{{prediction_text}}</h2>
{% if confidence %}
<h3>Confidence: {{confidence}} %</h3>
{% endif %}
</div>

</div>
</body>
</html>
